<div class="container">
    <p id="loading">Loading keystrokes…</p>

    <div id="error-view" class="hidden">
        <h2 id="error-title">Error</h2>
        <p id="error-msg"></p>
    </div>

    <div id="keystroke-view" class="hidden">
        <a id="back-link" href="#">← Back to proof</a>
        <h1 class="audit-heading">Keystroke audit</h1>
        <p id="summary" class="audit-summary"></p>
        <table id="table" class="audit-table">
            <thead>
                <tr class="audit-head">
                    <th>#</th>
                    <th>Type</th>
                    <th>Key</th>
                    <th>Length</th>
                    <th>Typed chars</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<script>
    const id = location.pathname.split("/")[2];
    document.getElementById("back-link").href = `/proofs/${id}`;
    const loadingEl = document.getElementById("loading");
    const errorView = document.getElementById("error-view");
    const keystrokeView = document.getElementById("keystroke-view");

    function showError(title, msg) {
        loadingEl.classList.add("hidden");
        document.getElementById("error-title").textContent = title;
        document.getElementById("error-msg").textContent = msg;
        errorView.classList.remove("hidden");
    }

    const CACHE_TTL = 15 * 60 * 1000;
    const cacheKey = `proof:${id}`;

    function readCache() {
        try {
            const raw = localStorage.getItem(cacheKey);
            if (!raw) return null;
            const { data, cachedAt } = JSON.parse(raw);
            if (Date.now() - cachedAt > CACHE_TTL) {
                localStorage.removeItem(cacheKey);
                return null;
            }
            return data;
        } catch {
            return null;
        }
    }

    function fetchProof() {
        return fetch(`/api/proofs/${id}`).then(async (res) => {
            if (res.status === 404)
                throw {
                    title: "Proof not found",
                    msg: "This proof does not exist.",
                };
            if (res.status === 410)
                throw {
                    title: "Proof expired",
                    msg: "Proofs are kept for 72 hours after creation.",
                };
            if (!res.ok)
                throw { title: "Error", msg: `Server error (${res.status}).` };
            return res.json();
        });
    }

    if (!id) {
        showError("Missing proof ID", "No proof ID was provided in the URL.");
    } else {
        Promise.resolve(readCache() ?? fetchProof())
            .then((data) => {
                loadingEl.classList.add("hidden");

                const events = data.events;
                const keyCount = events.filter((e) => e.type === "key").length;
                document.getElementById("summary").textContent =
                    `${keyCount} keystrokes, ${events.length} events - ID: ${id}`;

                const tbody = document.getElementById("tbody");
                events.forEach((e, i) => {
                    const d = new Date(e.timestamp);
                    const pad = (n, l = 2) => String(n).padStart(l, "0");
                    const ts = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}.${pad(d.getMilliseconds(), 3)}`;
                    const isControl = e.type !== "key";
                    const keyCell =
                        e.type === "key"
                            ? e.key.length === 1
                                ? e.key
                                : `[${e.key}]`
                            : "";
                    const lifecycleColors = {
                        start: "#5dca8a",
                        finish: "#5dca8a",
                        resume: "#5dca8a",
                        restore: "#5dca8a",
                        pause: "#e8a44a",
                        suspend: "#e8a44a",
                    };
                    const tr = document.createElement("tr");
                    tr.style.borderBottom = "1px solid #333";
                    tr.style.color = isControl
                        ? (lifecycleColors[e.type] ?? "#888")
                        : "beige";
                    tr.innerHTML = `
                        <td class="audit-td audit-td-index">${i + 1}</td>
                        <td class="audit-td">${e.type}</td>
                        <td class="audit-td">${keyCell}</td>
                        <td class="audit-td audit-td-dim">${e.length ?? ""}</td>
                        <td class="audit-td audit-td-dim">${e.typed ?? ""}</td>
                        <td class="audit-td-last audit-td-dim">${ts}</td>
                    `;
                    tbody.appendChild(tr);
                });

                keystrokeView.classList.remove("hidden");
            })
            .catch((err) =>
                showError(
                    err.title || "Failed to load",
                    err.msg || err.message || "Unexpected error.",
                ),
            );
    }
</script>
